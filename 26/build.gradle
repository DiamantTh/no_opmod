// ─────────────────────────────────────────────────────────────────────────────
// Visotaris – Minecraft 26.x (ehemals 1.21.11+, neues Mojang-Versionsschema)
// ─────────────────────────────────────────────────────────────────────────────────
plugins {
    id 'fabric-loom'                        version '1.16-SNAPSHOT'
    id 'org.jetbrains.kotlin.jvm'           version "${kotlin_version}"
    id 'com.gradleup.shadow'                version '9.4.1'
}

// Exakte MC-Version – wird für JAR-Name genutzt.
// Beim nächsten MC-Update hier und in den dependencies anpassen.
ext.mcVersion  = '26.1.2'
ext.javaVersion = 25    // MC 26.x + ModMenu 18.x erfordert Java 25

// MC 26.x ist nicht obfuskiert → Loom darf keinen Mappings-/Remapping-Setup durchführen.
// Muss per ext gesetzt werden, damit Looms lazy Provider es in afterEvaluate findet.
ext['fabric.loom.disableObfuscation'] = 'true'

// ── Shadow / Shade-Konfiguration ─────────────────────────────────────────────
// OkHttp + Okio werden in den Mod-JAR eingebettet (Pakete relociert, um
// Konflikte mit anderen Mods zu vermeiden). Kotlin-Stdlib kommt von FLK.
configurations {
    shade
    implementation.extendsFrom shade
}

// version & group kommen aus dem Root-build.gradle (subprojects-Block)

dependencies {
    // Minecraft – MC 26.x ist nicht obfuskiert, daher keine mappings-Zeile
    //noinspection LoomDependencyNotation
    minecraft "com.mojang:minecraft:26.1.2"

    // Fabric Loader + API (implementation, nicht modImplementation – kein Remapping nötig)
    implementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:0.146.1+26.1.2"

    // Mod Menu (MC 26.1.x → Reihe 18.x)
    // kein modImplementation: im disableObfuscation-Modus gibt es keine Remap-Konfigurationen
    implementation "com.terraformersmc:modmenu:18.0.0-alpha.8"

    // Kotlin Runtime (fabric-language-kotlin stellt Stdlib + Coroutinen bereit)
    implementation "net.fabricmc:fabric-language-kotlin:${fabric_language_kotlin_version}"

    // OkHttp 5 + Okio – im Mod-JAR eingebettet via shadowJar
    // Die Kotlin-Stdlib kommt von fabric-language-kotlin (FLK), daher exclude.
    shade("com.squareup.okhttp3:okhttp:5.3.2") {
        exclude group: 'org.jetbrains.kotlin'
    }

    // night-config (TOML-Parser) – im Mod-JAR eingebettet
    shade 'com.electronwill.night-config:toml:3.8.1'

    // Caffeine – hochperformanter In-Memory-Cache mit Größenlimit
    shade "com.github.ben-manes.caffeine:caffeine:${caffeine_version}"

    // Ktor CIO – eingebetteter HTTP-Server für das Web-UI
    // Kotlin, kotlinx und slf4j werden von FLK / Minecraft bereitgestellt → exclude
    shade("io.ktor:ktor-server-core:${ktor_version}") {
        exclude group: 'org.jetbrains.kotlin'
        exclude group: 'org.jetbrains.kotlinx'
        exclude group: 'org.slf4j'
    }
    shade("io.ktor:ktor-server-cio:${ktor_version}") {
        exclude group: 'org.jetbrains.kotlin'
        exclude group: 'org.jetbrains.kotlinx'
        exclude group: 'org.slf4j'
    }
}

loom {
    // 26.x hat eigene AW-Datei mit official-Namespace (Mojang-Klassennamen)
    accessWidenerPath = project.file("src/main/resources/visotaris_opmod.accesswidener")
    runs {
        client {
            client()
            setConfigName "Visotaris (26.x)"
            ideConfigGenerated true
            runDir "run"
        }
    }
}

base {
    archivesName = 'visotaris_opmod'
}

// ── Kotlin-Konfiguration ─────────────────────────────────────────────────────
kotlin {
    jvmToolchain(25)
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    // Kotlin 2.2.21 kennt JvmTarget.JVM_25 noch nicht → JVM_24 als Bytecode-Target;
    // Java-Klassen landen auf JVM 25, Kotlin auf JVM 24 – beide laufen auf JDK 25.
    // Die Mismatch-Validation ist in 26/gradle.properties auf WARNING gesetzt.
    compilerOptions {
        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_24)
        freeCompilerArgs.add("-Xjvm-default=all")
    }
}

// Gemeinsamen Kotlin-Quellpfad einhängen.
// Dateien in project/src/main/kotlin ÜBERSCHREIBEN gleichnamige aus dem Root.
// Root-afterEvaluate hängt rootProject/src/main/kotlin als plain srcDir ein;
// unser eigenes afterEvaluate (läuft danach) ersetzt es durch einen gefilterten FileTree.
def ktOverrides = [
    'systems/diath/visotaris_opmod/web/WebServer.kt',
]

sourceSets {
    main {
        kotlin {
            // Nur 26-spezifische Sources hier; Root-Quellen werden in afterEvaluate eingebunden.
            srcDir project.file('src/main/kotlin')
        }
        java {
            srcDir project.file('src/main/java')
        }
    }
}

// Root-afterEvaluate fügt rootProject/src/main/kotlin als plain srcDir hinzu.
// Wir laufen danach und filtern die überschriebenen Dateien via exclude() am Task-Level
// (SourceTask.exclude ist ein Spec-Filter, kein Property-Read → funktioniert mit write-only source).
afterEvaluate {
    def toExclude = ktOverrides.collect { f ->
        rootProject.file("src/main/kotlin/$f").canonicalPath
    }.toSet()
    tasks.named('compileKotlin') {
        exclude { fte -> toExclude.contains(fte.file.canonicalPath) }
    }
}

// ── Shadow-JAR-Pipeline (kein remapJar im disableObfuscation-Modus) ──────────
// MC 26.x ist nicht obfuskiert → kein remapJar-Schritt nötig.
// 1. jar      → Projektkl. ohne Shading  (classifier: dev)
// 2. shadowJar → Projektkl. + Shade-Deps (kein Classifier – finaler Mod-JAR)
jar {
    archiveClassifier = 'dev'
}

shadowJar {
    configurations    = [project.configurations.shade]
    archiveClassifier = ''
    // Paket-Relokation: verhindert Konflikte zur Laufzeit mit anderen Mods
    relocate 'okhttp3',                      'systems.diath.visotaris_opmod.shade.okhttp3'
    relocate 'okio',                         'systems.diath.visotaris_opmod.shade.okio'
    relocate 'com.electronwill.nightconfig',  'systems.diath.visotaris_opmod.shade.nightconfig'
    relocate 'com.github.benmanes.caffeine',   'systems.diath.visotaris_opmod.shade.caffeine'
    relocate 'io.ktor',                          'systems.diath.visotaris_opmod.shade.ktor'
}

assemble.dependsOn shadowJar

// processResources: das Root-AW (named-Namespace) kollidiert mit dem 26-spezifischen AW
// (official-Namespace). EXCLUDE → das zuerst gefundene Projekt-AW gewinnt.
processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}